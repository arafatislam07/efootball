<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Standard World Cup - eFootball Tournament Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="league-style.css"> 
</head>
<body>

    <header class="league-header">
        <div class="header-container">
            <button onclick="location.href='index.html'" class="back-btn"><i class="fas fa-arrow-left"></i> Home</button>
            <h1 id="league-title">🏆 STANDARD WORLD CUP</h1>
            <div id="admin-indicator" class="badge">Viewer Mode</div>
        </div>
    </header>

    <main class="container">
        
        <section id="league-list-section" class="card-section">
            <div class="section-header">
                <h2><i class="fas fa-globe-asia"></i> Active World Cups</h2>
                <button id="show-create-form-btn" onclick="toggleCreateForm()" style="display: none;"><i class="fas fa-plus"></i> Create World Cup</button>
            </div>
            <div id="active-leagues-grid" class="leagues-grid"></div>
        </section>

        <section id="create-wc-section" class="card-section" style="display: none;">
            <div class="section-header">
                <h2><i class="fas fa-trophy"></i> Generate FIFA World Cup</h2>
                <button onclick="toggleCreateForm()" class="back-btn"><i class="fas fa-times"></i> Cancel</button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Tournament Name</label>
                    <input type="text" id="wc-name-input" placeholder="e.g., JUST EEE World Cup 2026">
                </div>
                
                <div class="form-group">
                    <label>Messenger Group Link</label>
                    <input type="url" id="messenger-link-input" placeholder="Paste Messenger chat link...">
                </div>

                <div class="form-grid-row form-group-row">
                    <div class="form-group">
                        <label>Entry Fee</label>
                        <input type="text" id="prize-entry" placeholder="e.g., 50 or Free">
                    </div>
                    <div class="form-group">
                        <label>Total Prize (৳)</label>
                        <input type="number" id="prize-total" placeholder="Total ৳">
                    </div>
                    <div class="form-group">
                        <label>Champion (৳)</label>
                        <input type="number" id="prize-1st" placeholder="Champion ৳">
                    </div>
                    <div class="form-group">
                        <label>Runner-up (৳)</label>
                        <input type="number" id="prize-2nd" placeholder="Runner-up ৳">
                    </div>
                    <div class="form-group">
                        <label>Top Scorer (৳)</label>
                        <input type="number" id="prize-scorer" placeholder="Top Scorer ৳">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="far fa-calendar-check"></i> Select Matchdays per Week</label>
                    <div class="days-checkbox-grid">
                        <label><input type="checkbox" name="wc-days" value="0"> Sunday</label>
                        <label><input type="checkbox" name="wc-days" value="1"> Monday</label>
                        <label><input type="checkbox" name="wc-days" value="2"> Tuesday</label>
                        <label><input type="checkbox" name="wc-days" value="3"> Wednesday</label>
                        <label><input type="checkbox" name="wc-days" value="4"> Thursday</label>
                        <label><input type="checkbox" name="wc-days" value="5"> Friday</label>
                        <label><input type="checkbox" name="wc-days" value="6"> Saturday</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Players Names (Bulk Input - Must be 4, 8, 16 or 32 players)</label>
                    <textarea id="players-bulk-input" rows="6" placeholder="1. Arafat&#10;2. Musavvir&#10;3. Joy&#10;4. Tanvir"></textarea>
                </div>

                <button onclick="generateWorldCup()" class="submit-btn"><i class="fas fa-rocket"></i> Launch World Cup Tournament</button>
            </div>
        </section>

        <section id="league-view-section" class="card-section" style="display: none;">
            <div class="league-view-header">
                <button onclick="backToLeagueList()" class="back-link-btn"><i class="fas fa-chevron-left"></i> Back to Tournaments</button>
                <h2 id="current-active-league-name">World Cup Name</h2>
                <a id="messenger-join-btn" href="#" target="_blank" class="messenger-btn"><i class="fab fa-messenger"></i> Join Messenger Group</a>
            </div>

            <div class="prize-info-bar">
                <span><i class="fas fa-ticket-alt" style="color: #ffaa47;"></i> Entry: <strong id="view-prize-entry">Free</strong></span>
                <span><i class="fas fa-hand-holding-usd"></i> Total Prize: <strong id="view-prize-total">৳0</strong></span>
                <span><i class="fas fa-crown" style="color: gold;"></i> Champion: <strong id="view-prize-1st">৳0</strong></span>
                <span><i class="fas fa-medal" style="color: silver;"></i> Runner-up: <strong id="view-prize-2nd">৳0</strong></span>
                <span><i class="fas fa-shoe-prints" style="color: #ff7b72;"></i> Top Scorer (GF): <strong id="view-prize-scorer">৳0</strong></span>
            </div>

            <div class="tab-container">
                <button id="tab-table-btn" class="tab-btn active" onclick="switchWcTab('table')"><i class="fas fa-boxes"></i> Group Standings</button>
                <button id="tab-matches-btn" class="tab-btn" onclick="switchWcTab('matches')"><i class="fas fa-calendar-check"></i> Match Fixtures</button>
                <button id="tab-result-btn" class="tab-btn" onclick="switchWcTab('result')"><i class="fas fa-award"></i> World Cup Result</button>
            </div>

            <div id="tab-table-content" class="tab-content"></div>

            <div id="tab-matches-content" class="tab-content" style="display: none;">
                <div id="matchdays-container"></div>
            </div>

            <div id="tab-result-content" class="tab-content" style="display: none;">
                <div class="live-result-dashboard-grid">
                    <div class="result-live-card gold-border">
                        <div class="result-icon-crown"><i class="fas fa-trophy"></i></div>
                        <h4>WORLD CUP CHAMPION</h4>
                        <div id="live-champion-box" class="winner-identity-node"></div>
                        <div class="result-prize-tag" id="live-champ-prize"></div>
                    </div>
                    <div class="result-live-card silver-border">
                        <div class="result-icon-medal"><i class="fas fa-medal"></i></div>
                        <h4>RUNNER-UP</h4>
                        <div id="live-runnerup-box" class="winner-identity-node"></div>
                        <div class="result-prize-tag" id="live-runner-prize"></div>
                    </div>
                    <div class="result-live-card bronze-border">
                        <div class="result-icon-boot"><i class="fas fa-shoe-prints"></i></div>
                        <h4>GOLDEN BOOT (TOP SCORER)</h4>
                        <div id="live-topscorer-box" class="winner-identity-node"></div>
                        <div class="result-prize-tag" id="live-scorer-prize"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="score-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal" onclick="closeScoreModal()">&times;</span>
            <h3><i class="fas fa-edit"></i> Update Match Score</h3>
            <div class="modal-form">
                <div class="modal-teams-row">
                    <div class="modal-team-box">
                        <span id="modal-teamA-name">Team A</span>
                        <input type="number" id="modal-teamA-score" placeholder="Goals" min="0">
                        <input type="number" id="modal-teamA-poss" placeholder="Possession %" min="0" max="100">
                    </div>
                    <div class="modal-vs">VS</div>
                    <div class="modal-team-box">
                        <span id="modal-teamB-name">Team B</span>
                        <input type="number" id="modal-teamB-score" placeholder="Goals" min="0">
                        <input type="number" id="modal-teamB-poss" placeholder="Possession %" min="0" max="100">
                    </div>
                </div>
                <button onclick="saveMatchResult()" class="save-btn"><i class="fas fa-save"></i> Save Updates</button>
            </div>
        </div>
    </div>

    <script src="worldcup-script.js"></script>
</body>
</html>
